name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046 # v2.18.0
        with:
          channel: stable

      - name: Get version from pubspec
        id: get_version
        shell: bash
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: flutter pub get

      - name: Create Windows project files
        run: flutter create --platforms=windows .

      - name: Build Windows release
        run: flutter build windows --release

      - name: Create release archive
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          $dest = "apidash-windows-x64.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $dest

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: apidash-windows-x64-${{ steps.get_version.outputs.version }}
          path: apidash-windows-x64.zip
          retention-days: 30
